    <h1>Contact Me</h1>

    <section class="contact-section">
     <div class="container">
      <h2>Get In Touch</h2>
      <!-- action="#" keeps the form on the same page (no backend for this lab) -->
      <form class="contact-form" action="#" method="POST" novalidate>

       <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name"
               placeholder="Jane Doe" required>
       </div>

       <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="njeri.audrey@students.jkuat.ac.ke" required>
       </div>

       <div class="form-group">
        <label for="subject">Subject</label>
        <select id="subject" name="subject">
          <option value="">Select a subject</option>
          <option value="collaboration">Collaboration</option>
          <option value="employment">Employment Opportunity</option>
          <option value="enquiry">General Enquiry</option>
        </select>
       </div>

       <div class="form-group">
        <label for="msg">Message</label>
        <textarea id="msg" name="message" rows="5" required></textarea>
       </div>

       <button type="submit" class="btn">Send Message</button>
     </form>
   </div>
 </section>
